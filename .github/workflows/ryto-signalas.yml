name: Morning Magazine

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check London time and published state
        id: london-time
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/London"))
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          published_for = ""
          try:
              with urllib.request.urlopen(
                  f"https://terasfly.github.io/morning-news/ryto-signalas.json?t={int(now.timestamp())}",
                  timeout=10,
              ) as response:
                  published_for = json.loads(response.read().decode("utf-8")).get("generated_for", "")
          except (OSError, urllib.error.URLError, json.JSONDecodeError, UnicodeDecodeError):
              published_for = ""

          should_run = event_name in {"push", "workflow_dispatch"}
          if event_name == "schedule":
              should_run = 6 <= int(now.strftime("%H")) <= 10 and published_for != now.strftime("%Y-%m-%d")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"hour={now:%H}\n")
              output.write(f"date={now:%Y-%m-%d}\n")
              output.write(f"published_for={published_for}\n")
              output.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Checkout
        if: steps.london-time.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.london-time.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.london-time.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build newspaper
        if: steps.london-time.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python build_ryto_signalas_pdf.py --timezone Europe/London --date "${{ steps.london-time.outputs.date }}"

      - name: Verify generated files
        if: steps.london-time.outputs.should_run == 'true'
        run: |
          test -f public/ryto-signalas.json
          test -f public/latest.pdf
          test -f "public/archive/${{ steps.london-time.outputs.date }}/morning-magazine-${{ steps.london-time.outputs.date }}.pdf"

      - name: Set up Node
        if: steps.london-time.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        if: steps.london-time.outputs.should_run == 'true'
        run: npm ci

      - name: Build app
        if: steps.london-time.outputs.should_run == 'true'
        run: npm run build

      - name: Configure Pages
        if: steps.london-time.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.london-time.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.london-time.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Skip schedule
        if: steps.london-time.outputs.should_run != 'true'
        run: echo "Skipped. London hour=${{ steps.london-time.outputs.hour }}, published_for=${{ steps.london-time.outputs.published_for }}."
